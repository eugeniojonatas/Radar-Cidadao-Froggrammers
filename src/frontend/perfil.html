<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil Parlamentar | Portal SJC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">PORTAL<span>SJC</span></a>
        <nav><ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="deputados.html">Deputados</a></li>
            <li><a href="relatorios.html">Relatórios</a></li>
            <li><a href="graficos.html">Gráficos</a></li>
        </ul></nav>
    </header>

    <main class="container">
        <div id="main-content" style="display: grid; grid-template-columns: 320px 1fr; gap: 30px; margin-top: 20px;">
            <aside>
                <div class="card" style="text-align: center; position: sticky; top: 20px;">
                    <div id="wrapper-foto" style="min-height: 250px; background: #f0f0f0; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <img id="dep-foto" src="" style="width: 100%; border-radius: 8px; display: none;">
                        <span id="txt-foto">Carregando foto...</span>
                    </div>
                    <h2 id="dep-nome" style="margin: 15px 0; color: var(--primary);">Buscando...</h2>
                    <div style="text-align: left; padding: 10px; background: #f9f9f9; border-radius: 5px;">
                        <p><strong>Partido:</strong> <span id="dep-partido">-</span></p>
                        <p><strong>UF:</strong> <span id="dep-uf">-</span></p>
                    </div>
                </div>
            </aside>

            <section>
                <div class="card" style="margin-bottom: 25px; border-left: 5px solid var(--secondary); display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="font-size: 0.8rem; color: var(--text-light); text-transform: uppercase;">Total Acumulado (2025-2026)</h3>
                        <h2 id="dep-total" style="font-size: 2.5rem; color: var(--primary); margin: 5px 0;">R$ 0,00</h2>
                    </div>
                    <div id="status-carregamento" style="font-size: 0.75rem; color: #ff9800; font-weight: bold;">Iniciando...</div>
                </div>

                <div class="card">
                    <h3>Extrato de Despesas Detalhado</h3>
                    <div style="max-height: 600px; overflow-y: auto; margin-top: 15px;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
                            <thead style="background: #f8f9fa; position: sticky; top: 0; z-index: 10;">
                                <tr style="text-align: left;">
                                    <th style="padding: 15px; border-bottom: 2px solid #ddd; width: 110px;">Data</th>
                                    <th style="padding: 15px; border-bottom: 2px solid #ddd;">Origem / Despesa</th>
                                    <th style="padding: 15px; border-bottom: 2px solid #ddd; text-align: right;">Valor</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-gastos"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const idDeputado = new URLSearchParams(window.location.search).get('id');
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function carregarTudo() {
            if (!idDeputado) return;
            // Carregamos o perfil primeiro e esperamos ele ter sucesso para garantir os dados da esquerda
            await buscarPerfil();
            buscarGastos();
        }

        async function buscarPerfil() {
            const img = document.getElementById('dep-foto');
            const txt = document.getElementById('txt-foto');
            let sucesso = false;
            let tentativas = 0;

            while (!sucesso && tentativas < 10) {
                try {
                    const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${idDeputado}`);
                    
                    if (res.status === 429) {
                        tentativas++;
                        await delay(3000 * tentativas); // Espera progressiva
                        continue;
                    }

                    const json = await res.json();
                    const d = json.dados.ultimoStatus;

                    // Preenche os dados de texto IMEDIATAMENTE
                    document.getElementById('dep-nome').innerText = d.nome;
                    document.getElementById('dep-partido').innerText = d.siglaPartido;
                    document.getElementById('dep-uf').innerText = d.siglaUf;

                    // Tratamento da Imagem
                    const urlFotoOriginal = d.urlFoto;
                    const testadorImagem = new Image();
                    
                    // Adicionamos um parâmetro de tempo para evitar cache quebrado
                    testadorImagem.src = `${urlFotoOriginal}?v=${new Date().getTime()}`;

                    testadorImagem.onload = () => {
                        img.src = testadorImagem.src;
                        txt.style.display = 'none';
                        img.style.display = 'block';
                    };

                    testadorImagem.onerror = () => {
                        // Se a foto oficial falhar, usamos uma silhueta padrão
                        img.src = "https://www.camara.leg.br/tema/assets/images/foto-deputado-ausente.png";
                        txt.style.display = 'none';
                        img.style.display = 'block';
                    };

                    sucesso = true;
                } catch (e) {
                    tentativas++;
                    await delay(2000);
                }
            }
        }

        async function buscarGastos() {
            const status = document.getElementById('status-carregamento');
            let listaFinal = [];
            const anos = [2026, 2025];

            for (let ano of anos) {
                let pagina = 1;
                let temMais = true;

                while (temMais) {
                    status.innerText = `Sincronizando ${ano} (Pág ${pagina})...`;
                    try {
                        const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${idDeputado}/despesas?ano=${ano}&pagina=${pagina}&itens=100&ordem=DESC`);
                        if (res.status === 429) { await delay(4000); continue; }
                        
                        const json = await res.json();
                        if (json.dados.length === 0) {
                            temMais = false;
                        } else {
                            listaFinal = listaFinal.concat(json.dados);
                            atualizarTabela(listaFinal);
                            pagina++;
                            await delay(800);
                        }
                    } catch (e) { temMais = false; }
                    if (pagina > 20) temMais = false;
                }
            }
            status.innerText = "Sincronizado com Sucesso";
            status.style.color = "#4caf50";
        }

        function atualizarTabela(dados) {
            const tabela = document.getElementById('tabela-gastos');
            const totalDisplay = document.getElementById('dep-total');
            let soma = 0;

            dados.sort((a, b) => {
                const dataA = a.dataDocumento || `${a.ano}-${String(a.mes).padStart(2,'0')}-01`;
                const dataB = b.dataDocumento || `${b.ano}-${String(b.mes).padStart(2,'0')}-01`;
                return dataB.localeCompare(dataA);
            });

            tabela.innerHTML = dados.map(g => {
                soma += g.valorLiquido;
                
                // Correção da data para formato DD/MM/AAAA
                let dataExibicao = "---";
                if (g.dataDocumento) {
                    const partes = g.dataDocumento.substring(0, 10).split('-');
                    dataExibicao = `${partes[2]}/${partes[1]}/${partes[0]}`;
                } else {
                    dataExibicao = `01/${String(g.mes).padStart(2,'0')}/${g.ano}`;
                }

                return `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px; font-family: monospace;">${dataExibicao}</td>
                        <td style="padding: 12px;">
                            <b>${g.tipoDespesa}</b><br>
                            <small style="color: #666;">${g.nomeFornecedor}</small>
                        </td>
                        <td style="padding: 12px; text-align: right; font-weight: bold; color: #d32f2f;">
                            ${g.valorLiquido.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'})}
                        </td>
                    </tr>`;
            }).join('');

            totalDisplay.innerText = soma.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
        }

        carregarTudo();
    </script>
</body>
</html>
