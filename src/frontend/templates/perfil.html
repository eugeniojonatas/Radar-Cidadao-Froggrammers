<script>

const id = new URLSearchParams(window.location.search).get('id');

let todosOsGastos = [];

// JSONS PRESENÇAS
const arquivosPresencas = [

    "https://raw.githubusercontent.com/daviespedro/presenca_do_deputado/refs/heads/main/presencas_parte1.json",

    "https://raw.githubusercontent.com/daviespedro/presenca_do_deputado/refs/heads/main/presencas_parte2.json",

    "https://raw.githubusercontent.com/daviespedro/presenca_do_deputado/refs/heads/main/presencas_parte3.json"

];

// JSON TOTAL EVENTOS
const urlTotalEventos =
"https://raw.githubusercontent.com/daviespedro/presenca_do_deputado/refs/heads/main/total_eventos.json";


// =====================================
// INIT
// =====================================

async function init() {

    if (!id) return;

    await carregarPerfil();

    await carregarGastos();

    await carregarPresencas();

    await carregarFeedbacks();
}


// =====================================
// PERFIL
// =====================================

async function carregarPerfil() {

    const img = document.getElementById("dep-foto");

    const txt = document.getElementById("txt-foto");

    try {

        const res =
            await fetch(`/api/deputado/${id}`);

        const d = await res.json();

        document.getElementById("dep-nome").innerText =
            d.nome || "Sem nome";

        document.getElementById("dep-partido").innerText =
            d.partido || "-";

        document.getElementById("dep-uf").innerText =
            d.uf || "-";

        if (d.foto) {

            img.src = d.foto;

            img.style.display = "block";

            txt.style.display = "none";

        } else {

            txt.innerText = "Sem foto";
        }

    } catch {

        txt.innerText = "Erro ao carregar";
    }
}


// =====================================
// GASTOS
// =====================================

async function carregarGastos() {

    const status =
        document.getElementById(
            "status-carregamento"
        );

    try {

        const res =
            await fetch(`/api/gastos/${id}`);

        todosOsGastos =
            await res.json();

        status.innerText =
            "Processando...";

        todosOsGastos.sort(
            (a,b) =>
                new Date(b.dataDocumento)
                - new Date(a.dataDocumento)
        );

        popularFiltro(todosOsGastos);

        renderTabela(todosOsGastos);

        status.innerText =
            "Finalizado";

        status.style.color =
            "green";

    } catch {

        status.innerText =
            "Erro";

        status.style.color =
            "red";
    }
}

function popularFiltro(lista) {

    const filtro =
        document.getElementById(
            "filtro-tipo"
        );

    const tipos = [
        ...new Set(
            lista.map(
                g => g.tipoDespesa
            )
        )
    ].sort();

    tipos.forEach(tipo => {

        if (tipo) {

            const option =
                document.createElement(
                    "option"
                );

            option.value = tipo;

            option.innerText = tipo;

            filtro.appendChild(option);
        }
    });

    filtro.addEventListener(
        "change",
        (e) => {

            const selecionado =
                e.target.value;

            const listaFiltrada =
                selecionado === "todos"
                ? todosOsGastos
                : todosOsGastos.filter(
                    g =>
                        g.tipoDespesa
                        === selecionado
                );

            renderTabela(
                listaFiltrada
            );
        }
    );
}

function renderTabela(lista) {

    const tabela =
        document.getElementById(
            "tabela-gastos"
        );

    const totalEl =
        document.getElementById(
            "dep-total"
        );

    let total = 0;

    tabela.innerHTML =
        lista.map(g => {

            const valor =
                g.valorDocumento || 0;

            total += valor;

            const data =
                g.dataDocumento
                ? g.dataDocumento
                    .split("T")[0]
                    .split("-")
                    .reverse()
                    .join("/")
                : "-";

            return `
            <tr>

                <td>${data}</td>

                <td>
                    ${g.tipoDespesa || "-"}
                </td>

                <td style="text-align:right;">

                    ${valor.toLocaleString(
                        'pt-br',
                        {
                            style:'currency',
                            currency:'BRL'
                        }
                    )}

                </td>

            </tr>
            `;
        }).join("");

    totalEl.innerText =
        total.toLocaleString(
            'pt-br',
            {
                style:'currency',
                currency:'BRL'
            }
        );
}


// =====================================
// PRESENÇAS
// =====================================

async function carregarPresencas() {

    try {

        let deputado = null;

        for (const url of arquivosPresencas) {

            const res = await fetch(url);

            const lista = await res.json();

            deputado = lista.find(
                d =>
                    String(d.deputado_id)
                    === String(id)
            );

            if (deputado) break;
        }

        if (!deputado) {

            document.getElementById(
                "tabela-presencas"
            ).innerHTML = `
                <tr>
                    <td colspan="3">
                        Nenhuma presença encontrada
                    </td>
                </tr>
            `;

            return;
        }

        const resEventos =
            await fetch(urlTotalEventos);

        const totalEventosJson =
            await resEventos.json();

        const eventos2025 =
            totalEventosJson["2025"] || 0;

        const eventos2026 =
            totalEventosJson["2026"] || 0;

        const totalEventos =
            eventos2025 + eventos2026;

        const eventos =
            deputado.eventos || [];

        const presencas =
            eventos.filter(evento => {

                const statusTexto =
                    String(
                        evento.status || ""
                    ).toLowerCase();

                return (
                    evento.presente === true
                    ||
                    statusTexto.includes("presente")
                    ||
                    statusTexto.includes("compareceu")
                );

            });

        let presencas2025 = 0;
        let presencas2026 = 0;

        presencas.forEach(evento => {

            if (
                evento.data &&
                evento.data.includes("2025")
            ) {
                presencas2025++;
            }

            if (
                evento.data &&
                evento.data.includes("2026")
            ) {
                presencas2026++;
            }

        });

        const totalPresencas =
            presencas.length;

        const totalFaltas =
            totalEventos - totalPresencas;

        const percentual =
            (
                (totalPresencas / totalEventos)
                * 100
            ).toFixed(1);

        document.getElementById(
            "total-presencas"
        ).innerText =
            totalPresencas;

        document.getElementById(
            "eventos-total"
        ).innerText =
            totalEventos;

        document.getElementById(
            "faltas-count"
        ).innerText =
            totalFaltas;

        document.getElementById(
            "presenca-2025"
        ).innerHTML =
            `${presencas2025}`;

        document.getElementById(
            "presenca-2026"
        ).innerHTML =
            `${presencas2026}`;

        document.getElementById(
            "total-presencas-card"
        ).innerHTML =
            `${percentual}%`;

        const tabela =
            document.getElementById(
                "tabela-presencas"
            );

        tabela.innerHTML =
            presencas.map(evento => {

                const data =
                    evento.data
                    ? evento.data
                        .split("T")[0]
                        .split("-")
                        .reverse()
                        .join("/")
                    : "-";

                return `

                    <tr>

                        <td>${data}</td>

                        <td>
                            ${
                                evento.descricao
                                ||
                                "Evento"
                            }
                        </td>

                        <td style="
                            color:green;
                            font-weight:bold;
                        ">
                            ✅ Presente
                        </td>

                    </tr>

                `;

            }).join("");

    } catch(err) {

        console.error(err);
    }
}


// =====================================
// FEEDBACKS
// =====================================

async function carregarFeedbacks() {

    try {

        const res =
            await fetch(`/api/feedback/${id}`);

        const feedbacks =
            await res.json();

        const lista =
            document.getElementById(
                "lista-feedbacks"
            );

        const mediaEl =
            document.getElementById(
                "media-notas"
            );

        if (!feedbacks.length) {

            lista.innerHTML = `
                <p>Nenhuma avaliação encontrada.</p>
            `;

            mediaEl.innerText = "0";

            return;
        }

        const soma =
            feedbacks.reduce(
                (acc, item) =>
                    acc + item.nota,
                0
            );

        const media =
            (soma / feedbacks.length)
            .toFixed(1);

        mediaEl.innerText = media;

        lista.innerHTML =
            feedbacks.map(f => `

                <div class="feedback-item">

                    <h4>
                        ${f.nome}
                    </h4>

                    <small>
                        Nota: ${f.nota} ⭐
                    </small>

                    <p>
                        ${f.comentario}
                    </p>

                </div>

            `).join("");

    } catch(err) {

        console.error(err);
    }
}


// =====================================
// ENVIAR FEEDBACK
// =====================================

document
.getElementById("form-feedback")
.addEventListener(
    "submit",
    async (e) => {

        e.preventDefault();

        const nome =
            document.getElementById(
                "nome-usuario"
            ).value;

        const nota =
            document.getElementById(
                "nota-feedback"
            ).value;

        const comentario =
            document.getElementById(
                "comentario-feedback"
            ).value;

        try {

            const res =
                await fetch(
                    "/api/feedback",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body:JSON.stringify({

                            deputado_id:id,

                            nome,

                            nota,

                            comentario
                        })
                    }
                );

            const data =
                await res.json();

            alert(data.message);

            document
            .getElementById(
                "form-feedback"
            )
            .reset();

            carregarFeedbacks();

        } catch(err) {

            console.error(err);

            alert(
                "Erro ao enviar avaliação"
            );
        }

    }
);


// =====================================
// START
// =====================================

init();

</script>
