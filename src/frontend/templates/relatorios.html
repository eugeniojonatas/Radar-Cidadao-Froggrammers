<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | Radar Cidadão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="navbar">
        <a href="/" class="logo">RADAR<span>CIDADÃO</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/deputados.html">Deputados</a></li>
                <li><a href="/relatorios.html" class="active">Relatórios</a></li>
                <li><a href="/graficos.html">Gráficos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="card" style="margin-bottom: 30px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div>
                    <label>Tipo de Busca</label>
                    <select id="tipo-busca" style="width:100%; padding:10px; border-radius:5px;">
                        <option value="proposicoes">Proposições (Leis/Projetos)</option>
                        <option value="despesas">Cotas Parlamentares (Gastos)</option>
                    </select>
                </div>

                <div>
                    <label>Nome do Deputado</label>
                    <input type="text" id="nome-busca" list="lista-deputados" placeholder="Carregando lista..."
                        style="width:100%; padding:10px; border-radius:5px;" autocomplete="off">
                    <datalist id="lista-deputados"></datalist>
                </div>

                <div>
                    <label>Ano</label>
                    <input type="number" id="ano-busca" value="2025"
                        style="width:100%; padding:10px; border-radius:5px;">
                </div>
            </div>

            <button id="btn-pesquisar" onclick="buscarRelatorio()" class="btn"
                style="margin-top:20px; background: var(--secondary); border:none; cursor:pointer;">
                Pesquisar
            </button>
        </div>

        <div class="card">
            <h3 id="titulo-resultados" style="color: var(--primary); margin-bottom: 10px;">Resultados</h3>
            <p id="total-geral" style="margin-bottom:15px; font-weight:bold; color: #333;"></p>

            <table style="width:100%; border-collapse:collapse;">
                <thead style="background:#f4f4f4;">
                    <tr id="cabecalho-tabela">
                        <th id="col-desc" style="padding:12px; text-align:left;">Descrição</th>
                        <th id="col-info" style="padding:12px; text-align:right;">Informação</th>
                    </tr>
                </thead>
                <tbody id="resultado-tabela">
                    <tr>
                        <td colspan="2" style="padding:20px; text-align:center; color:#999;">
                            Selecione um deputado e clique em pesquisar
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

<script>
    let mapaDeputados = {};

    // Função de carregamento ultra-resiliente
    async function carregarSugestoes() {
        const input = document.getElementById('nome-busca');
        const datalist = document.getElementById('lista-deputados');
        
        try {
            // Usando HTTPS explícito para evitar erro de Mixed Content no Render
            const response = await fetch("https://dadosabertos.camara.leg.br/api/v2/deputados?ordem=ASC&ordenarPor=nome");
            const data = await response.json();
            
            if (data.dados) {
                datalist.innerHTML = "";
                data.dados.forEach(dep => {
                    const option = document.createElement('option');
                    option.value = dep.nome;
                    datalist.appendChild(option);
                    mapaDeputados[dep.nome.toUpperCase()] = dep.id;
                });
                input.placeholder = "Digite o nome...";
                console.log("Deputados carregados.");
            }
        } catch (error) {
            console.error("Erro na API:", error);
            input.placeholder = "Erro ao carregar nomes. Tente recarregar a página.";
        }
    }

    window.onload = carregarSugestoes;

    async function buscarRelatorio() {
        const nome = document.getElementById('nome-busca').value.trim().toUpperCase();
        const ano = document.getElementById('ano-busca').value;
        const tipo = document.getElementById('tipo-busca').value;
        const id = mapaDeputados[nome];

        if (!id) {
            alert("Selecione um deputado válido da lista.");
            return;
        }

        const tabela = document.getElementById('resultado-tabela');
        const totalTexto = document.getElementById('total-geral');
        
        tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Buscando dados...</td></tr>`;

        try {
            if (tipo === "proposicoes") {
                document.getElementById('col-desc').innerText = "Ementa (Assunto)";
                document.getElementById('col-info').innerText = "Proposição";

                const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/proposicoes?idDeputadoAutor=${id}&ano=${ano}&ordem=DESC&ordenarPor=id`);
                const json = await res.json();

                if (!json.dados || json.dados.length === 0) {
                    tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Nenhuma lei ou projeto encontrado em ${ano}.</td></tr>`;
                    return;
                }

                totalTexto.innerText = `Total de Proposições: ${json.dados.length}`;
                tabela.innerHTML = json.dados.map(p => `
                    <tr style="border-bottom:1px solid #eee;">
                        <td style="padding:12px; font-size: 14px;">${p.ementa}</td>
                        <td style="padding:12px; text-align:right; white-space:nowrap;"><strong>${p.siglaTipo} ${p.numero}/${p.ano}</strong></td>
                    </tr>
                `).join('');

            } else {
                document.getElementById('col-desc').innerText = "Tipo de Gasto";
                document.getElementById('col-info').innerText = "Valor Líquido";

                const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?ano=${ano}&ordem=DESC`);
                const json = await res.json();

                if (!json.dados || json.dados.length === 0) {
                    tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Sem gastos registrados em ${ano}.</td></tr>`;
                    return;
                }

                // Agrupamento por categoria
                let resumo = {};
                json.dados.forEach(d => {
                    resumo[d.tipoDespesa] = (resumo[d.tipoDespesa] || 0) + d.valorLiquido;
                });

                const totalSoma = Object.values(resumo).reduce((a, b) => a + b, 0);
                totalTexto.innerText = `Total gasto em ${ano}: ${totalSoma.toLocaleString('pt-br',{style:'currency',currency:'BRL'})}`;

                tabela.innerHTML = Object.entries(resumo)
                    .sort((a,b) => b[1] - a[1])
                    .map(([cat, val]) => `
                        <tr style="border-bottom:1px solid #eee;">
                            <td style="padding:12px;">${cat}</td>
                            <td style="padding:12px; text-align:right; font-weight:bold;">${val.toLocaleString('pt-br',{style:'currency',currency:'BRL'})}</td>
                        </tr>
                    `).join('');
            }
        } catch (err) {
            tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center; color:red;">Erro ao acessar dados da Câmara.</td></tr>`;
        }
    }
</script>
</body>
</html>
