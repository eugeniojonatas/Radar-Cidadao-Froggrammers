<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deputados | Portal SJC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="toast" class="toast"></div>

<!-- 🔥 NAVBAR CORRIGIDA -->
<header class="navbar" style="display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#0d47a1;">
    <a href="/" class="logo" style="color:white; text-decoration:none; font-weight:bold;">
        PORTAL<span style="color:#ff9800;">SJC</span>
    </a>

    <nav>
        <ul style="display:flex; gap:20px; list-style:none; margin:0;">
            <li><a href="/" style="color:white;">Home</a></li>
            <li><a href="/deputados.html" style="color:#ff9800;">Deputados</a></li>
            <li><a href="/relatorios.html" style="color:white;">Relatórios</a></li>
            <li><a href="/graficos.html" style="color:white;">Gráficos</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <h1>Representantes na Câmara Federal</h1>
    <p id="contagem">Carregando deputados...</p>

    <div class="card">
        <input type="text" id="busca-nome" placeholder="Buscar deputado...">

        <select id="filtro-estado">
            <option value="">Todos</option>
        </select>

        <select id="filtro-partido">
            <option value="">Todos</option>
        </select>

        <button id="btn-modo" onclick="toggleModoComparacao()">
            Comparar Deputados
        </button>

        <button id="btn-gerar-comparacao" disabled style="display:none; opacity:0.5; cursor:not-allowed;">
            Gerar Comparação [0/4]
        </button>
    </div>

    <div id="lista-deputados" class="grid"></div>
</main>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">

    <div style="background:white; padding:20px; border-radius:10px; width:90%; max-width:900px; position:relative;">
        <button onclick="fecharModal()" 
            style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; padding:5px 10px;">
            X
        </button>

        <h2>Comparação</h2>
        <div id="comparacao"></div>
    </div>
</div>

<script>
let selecionados = new Set();
let modoComparacao = false;
let todosDeputados = [];

// NORMALIZAÇÃO
function normalizarDeputado(d) {
    return {
        id: d.id,
        nome: d.nome || "Sem nome",
        partido: d.siglaPartido || d.partido || "-",
        uf: d.siglaUf || d.uf || "-",
        foto: d.urlFoto || d.foto || ""
    };
}

// CARREGAR
async function carregarDeputados() {
    const res = await fetch('/api/deputados');
    const json = await res.json();

    const lista = Array.isArray(json) ? json : json.dados || [];
    todosDeputados = lista.map(normalizarDeputado);

    popularFiltros();
    renderizarCards(todosDeputados);
}

// FILTROS
function popularFiltros() {
    const estados = [...new Set(todosDeputados.map(d => d.uf))];
    const partidos = [...new Set(todosDeputados.map(d => d.partido))];

    const selEstado = document.getElementById("filtro-estado");
    const selPartido = document.getElementById("filtro-partido");

    estados.forEach(e => selEstado.innerHTML += `<option>${e}</option>`);
    partidos.forEach(p => selPartido.innerHTML += `<option>${p}</option>`);
}

// RENDER
function renderizarCards(lista) {
    document.getElementById("contagem").innerText = `${lista.length} deputados`;

    document.getElementById("lista-deputados").innerHTML = lista.map(d => `
        <div class="card" style="text-align:center; border:${selecionados.has(d.id) ? '2px solid orange' : '1px solid #ddd'}">

            <img src="${d.foto || 'https://www.camara.leg.br/tema/assets/images/foto-deputado-ausente.png'}"
                 style="width:100%; height:200px; object-fit:cover;">

            <h3>${d.nome}</h3>
            <p>${d.partido} - ${d.uf}</p>

            ${
                modoComparacao
                ? `<button class="btn-selecionar" data-id="${d.id}">
                        ${selecionados.has(d.id) ? "Selecionado" : "Selecionar"}
                   </button>`
                : `<a href="/perfil.html?id=${d.id}">Ver Perfil</a>`
            }
        </div>
    `).join("");
}

// FILTRO
function aplicarFiltros() {
    const nome = document.getElementById("busca-nome").value.toLowerCase();
    const uf = document.getElementById("filtro-estado").value;
    const partido = document.getElementById("filtro-partido").value;

    const filtrados = todosDeputados.filter(d =>
        d.nome.toLowerCase().includes(nome) &&
        (uf === "" || d.uf === uf) &&
        (partido === "" || d.partido === partido)
    );

    renderizarCards(filtrados);
}

busca-nome.oninput = aplicarFiltros;
filtro-estado.onchange = aplicarFiltros;
filtro-partido.onchange = aplicarFiltros;

// MODO COMPARAÇÃO
function toggleModoComparacao() {
    modoComparacao = !modoComparacao;

    const btnGerar = document.getElementById("btn-gerar-comparacao");
    btnGerar.style.display = modoComparacao ? "inline-block" : "none";

    if (!modoComparacao) selecionados.clear();

    atualizarBotao();
    renderizarCards(todosDeputados);
}

// SELEÇÃO
document.addEventListener("click", e => {
    if (!modoComparacao) return;

    const btn = e.target.closest(".btn-selecionar");
    if (!btn) return;

    const id = Number(btn.dataset.id);

    if (selecionados.has(id)) {
        selecionados.delete(id);
    } else {
        if (selecionados.size >= 4) {
            toast("Máximo 4 deputados");
            return;
        }
        selecionados.add(id);
    }

    atualizarBotao();
    renderizarCards(todosDeputados);
});

// BOTÃO
function atualizarBotao() {
    const btn = document.getElementById("btn-gerar-comparacao");

    btn.innerText = `Gerar Comparação [${selecionados.size}/4]`;
    btn.disabled = selecionados.size < 2;
}

// EVENTO
document.getElementById("btn-gerar-comparacao").addEventListener("click", gerarComparacao);

// 🔥 GASTOS CORRIGIDO
async function buscarGastos(id, callback) {
    let total = 0;
    const anos = [2026, 2025];

    for (let ano of anos) {
        let pagina = 1;

        while (true) {
            const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?ano=${ano}&pagina=${pagina}&itens=100`);
            const json = await res.json();

            if (!json.dados || json.dados.length === 0) break;

            json.dados.forEach(d => total += d.valorLiquido || 0);

            pagina++;
            callback(total);
        }
    }
}

// GERAR
function gerarComparacao() {
    const base = todosDeputados.filter(d => selecionados.has(d.id));

    const lista = base.map(d => ({
        ...d,
        gastos: "Carregando..."
    }));

    atualizarTabela(lista);
    modal.style.display = "flex";

    lista.forEach((d, i) => {
        buscarGastos(d.id, valor => {
            lista[i].gastos = valor;
            atualizarTabela(lista);
        });
    });
}

// TABELA
function atualizarTabela(lista) {
    comparacao.innerHTML = `
        <table style="width:100%; text-align:center;">
            <tr>
                <th>Foto</th>
                ${lista.map(d => `<td><img src="${d.foto}" style="width:70px;height:70px;"></td>`).join('')}
            </tr>
            <tr>
                <th>Nome</th>
                ${lista.map(d => `<td>${d.nome}</td>`).join('')}
            </tr>
            <tr>
                <th>Gastos</th>
                ${lista.map(d => `<td>${typeof d.gastos === "number" ? d.gastos.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : d.gastos}</td>`).join('')}
            </tr>
        </table>
    `;
}

// FECHAR
function fecharModal() {
    modal.style.display = "none";
}

// TOAST
function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

// INIT
carregarDeputados();
</script>

</body>
</html>
