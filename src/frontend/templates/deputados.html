<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deputados | Portal SJC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Garantindo que a Navbar não seja sobreposta */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toast { visibility: hidden; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 5px; z-index: 3000; }
        .toast.show { visibility: visible; }

        /* GRID FIXO EM 4 COLUNAS */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            padding: 20px 0; 
        }

        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fff; transition: 0.3s; }
        .card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* ESTILO NOVO DOS BOTÕES DE SELEÇÃO (MODO COMPARAÇÃO) */
        .btn-selecionar-custom {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ff9800;
            transition: 0.3s;
        }

        /* ESTILO DO LINK VER PERFIL */
        .btn-perfil {
            display: inline-block;
            margin-top: 10px;
            color: #0d47a1;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 15px;
            border: 1px solid #0d47a1;
            border-radius: 5px;
        }
        .btn-perfil:hover { background: #0d47a1; color: white; }
    </style>
</head>

<body>

<div id="toast" class="toast"></div>

<header class="navbar" style="display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#0d47a1;">
    <a href="/" class="logo" style="color:white; text-decoration:none; font-weight:bold; font-size: 1.5rem;">
        PORTAL<span style="color:#ff9800;">SJC</span>
    </a>

    <nav>
        <ul style="display:flex; gap:20px; list-style:none; margin:0; padding:0;">
            <li><a href="/" style="color:white; text-decoration:none;">Home</a></li>
            <li><a href="/deputados.html" style="color:#ff9800; text-decoration:none; font-weight:bold;">Deputados</a></li>
            <li><a href="/relatorios.html" style="color:white; text-decoration:none;">Relatórios</a></li>
            <li><a href="/graficos.html" style="color:white; text-decoration:none;">Gráficos</a></li>
        </ul>
    </nav>
</header>

<main class="container" style="padding: 20px 10%;">
    <h1>Representantes na Câmara Federal</h1>
    <p id="contagem">Carregando deputados...</p>

    <div class="filter-bar" style="background:#f4f4f4; padding:20px; border-radius:8px; margin-bottom:20px; display: flex; gap: 10px; align-items: center;">
        <input type="text" id="busca-nome" placeholder="Buscar deputado..." style="padding:10px; flex: 1; border: 1px solid #ccc; border-radius: 5px;">

        <select id="filtro-estado" style="padding:10px; border: 1px solid #ccc; border-radius: 5px;">
            <option value="">Todos Estados</option>
        </select>

        <select id="filtro-partido" style="padding:10px; border: 1px solid #ccc; border-radius: 5px;">
            <option value="">Todos Partidos</option>
        </select>

        <button id="btn-modo" onclick="toggleModoComparacao()" style="padding:10px 15px; cursor:pointer; background: #333; color: white; border: none; border-radius: 5px;">
            Comparar Deputados
        </button>

        <button id="btn-gerar-comparacao" disabled style="display:none; padding:10px 15px; background:#ff9800; border:none; color:white; font-weight:bold; border-radius: 5px;">
            Gerar Comparação [0/4]
        </button>
    </div>

    <div id="lista-deputados" class="grid"></div>
</main>

<!-- MODAL (Mantive a lógica original) -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:2000;">
    <div style="background:white; padding:20px; border-radius:10px; width:95%; max-width:900px; position:relative; overflow-x:auto;">
        <button onclick="fecharModal()" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; padding:5px 10px; cursor:pointer; font-weight:bold;">X</button>
        <h2 style="margin-top:0;">Comparação de Despesas</h2>
        <div id="comparacao"></div>
    </div>
</div>

<script>
let selecionados = new Set();
let modoComparacao = false;
let todosDeputados = [];

const elLista = document.getElementById("lista-deputados");
const elContagem = document.getElementById("contagem");
const elBusca = document.getElementById("busca-nome");
const elUf = document.getElementById("filtro-estado");
const elPartido = document.getElementById("filtro-partido");
const elBtnGerar = document.getElementById("btn-gerar-comparacao");

function normalizarDeputado(d) {
    return {
        id: d.id,
        nome: d.nome || "Sem nome",
        partido: d.siglaPartido || d.partido || "-",
        uf: d.siglaUf || d.uf || "-",
        foto: d.urlFoto || d.foto || ""
    };
}

async function carregarDeputados() {
    try {
        let res = await fetch('/api/deputados').catch(() => fetch('https://dadosabertos.camara.leg.br/api/v2/deputados?ordem=ASC&ordenarPor=nome'));
        const json = await res.json();
        const lista = Array.isArray(json) ? json : (json.dados || []);
        todosDeputados = lista.map(normalizarDeputado);
        popularFiltros();
        renderizarCards(todosDeputados);
    } catch (err) {
        elContagem.innerText = "Erro ao carregar dados.";
    }
}

function popularFiltros() {
    const estados = [...new Set(todosDeputados.map(d => d.uf))].sort();
    const partidos = [...new Set(todosDeputados.map(d => d.partido))].sort();
    estados.forEach(e => { if(e !== "-") elUf.innerHTML += `<option value="${e}">${e}</option>`; });
    partidos.forEach(p => { if(p !== "-") elPartido.innerHTML += `<option value="${p}">${p}</option>`; });
}

function renderizarCards(lista) {
    elContagem.innerText = `${lista.length} deputados encontrados`;
    elLista.innerHTML = lista.map(d => `
        <div class="card" style="text-align:center; border:${selecionados.has(d.id) ? '3px solid #ff9800' : '1px solid #ddd'}">
            <img src="${d.foto || 'https://www.camara.leg.br/tema/assets/images/foto-deputado-ausente.png'}" 
                 style="width:120px; height:150px; object-fit:cover; border-radius:4px; background:#eee;">
            <h3 style="font-size:1rem; margin:10px 0 5px; color: #333;">${d.nome}</h3>
            <p style="color:#666; font-size:0.9rem;">${d.partido} - ${d.uf}</p>
            ${modoComparacao 
                ? `<button class="btn-selecionar btn-selecionar-custom" data-id="${d.id}" style="background:${selecionados.has(d.id) ? '#ff9800' : 'transparent'}; color:${selecionados.has(d.id) ? 'white' : '#ff9800'};">
                    ${selecionados.has(d.id) ? "Selecionado" : "Selecionar"}
                   </button>`
                : `<a href="/perfil.html?id=${d.id}" class="btn-perfil">Ver Perfil</a>`
            }
        </div>
    `).join("");
}

function aplicarFiltros() {
    const nome = elBusca.value.toLowerCase();
    const uf = elUf.value;
    const partido = elPartido.value;
    const filtrados = todosDeputados.filter(d =>
        d.nome.toLowerCase().includes(nome) &&
        (uf === "" || d.uf === uf) &&
        (partido === "" || d.partido === partido)
    );
    renderizarCards(filtrados);
}

elBusca.addEventListener('input', aplicarFiltros);
elUf.addEventListener('change', aplicarFiltros);
elPartido.addEventListener('change', aplicarFiltros);

function toggleModoComparacao() {
    modoComparacao = !modoComparacao;
    elBtnGerar.style.display = modoComparacao ? "inline-block" : "none";
    if (!modoComparacao) selecionados.clear();
    atualizarBotao();
    renderizarCards(todosDeputados);
}

document.addEventListener("click", e => {
    const btn = e.target.closest(".btn-selecionar");
    if (!btn || !modoComparacao) return;
    const id = Number(btn.dataset.id);
    if (selecionados.has(id)) {
        selecionados.delete(id);
    } else {
        if (selecionados.size >= 4) return toast("Máximo 4 deputados");
        selecionados.add(id);
    }
    atualizarBotao();
    renderizarCards(todosDeputados);
});

function atualizarBotao() {
    elBtnGerar.innerText = `Gerar Comparação [${selecionados.size}/4]`;
    elBtnGerar.disabled = selecionados.size < 2;
    elBtnGerar.style.opacity = selecionados.size < 2 ? "0.5" : "1";
    elBtnGerar.style.cursor = selecionados.size < 2 ? "not-allowed" : "pointer";
}

elBtnGerar.addEventListener("click", gerarComparacao);

async function buscarGastos(id, callback) {
    let total = 0;
    const anos = [2026, 2025];
    try {
        for (let ano of anos) {
            const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?ano=${ano}&itens=100`);
            const json = await res.json();
            if (json.dados) json.dados.forEach(d => total += d.valorLiquido || 0);
            callback(total);
        }
    } catch (e) { console.error(e); }
}

function gerarComparacao() {
    const base = todosDeputados.filter(d => selecionados.has(d.id));
    const lista = base.map(d => ({ ...d, gastos: "Carregando..." }));
    atualizarTabela(lista);
    document.getElementById("modal").style.display = "flex";
    lista.forEach((d, i) => {
        buscarGastos(d.id, valor => {
            lista[i].gastos = valor;
            atualizarTabela(lista);
        });
    });
}

function atualizarTabela(lista) {
    document.getElementById("comparacao").innerHTML = `
        <table border="1" style="width:100%; border-collapse:collapse; text-align:center;">
            <tr style="background:#0d47a1; color: white;">
                <th style="padding:10px;">Critério</th>
                ${lista.map(d => `<th style="padding:10px;">${d.nome}</th>`).join('')}
            </tr>
            <tr>
                <td><b>Foto</b></td>
                ${lista.map(d => `<td><img src="${d.foto}" style="width:60px;"></td>`).join('')}
            </tr>
            <tr>
                <td><b>Partido/UF</b></td>
                ${lista.map(d => `<td>${d.partido} - ${d.uf}</td>`).join('')}
            </tr>
            <tr>
                <td><b>Gastos (25/26)</b></td>
                ${lista.map(d => `<td>${typeof d.gastos === "number" ? d.gastos.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) : d.gastos}</td>`).join('')}
            </tr>
        </table>
    `;
}

function fecharModal() { document.getElementById("modal").style.display = "none"; }
function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
}

carregarDeputados();
</script>
</body>
</html>
