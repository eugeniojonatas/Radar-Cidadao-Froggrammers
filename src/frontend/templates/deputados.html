<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deputados | Portal SJC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="toast" class="toast"></div>

<header class="navbar">
    <a href="/" class="logo">PORTAL<span>SJC</span></a>
</header>

<main class="container">
    <h1>Representantes na Câmara Federal</h1>
    <p id="contagem">Carregando deputados...</p>

    <div class="card">
        <input type="text" id="busca-nome" placeholder="Buscar deputado...">

        <select id="filtro-estado">
            <option value="">Todos</option>
        </select>

        <select id="filtro-partido">
            <option value="">Todos</option>
        </select>

        <button id="btn-modo" onclick="toggleModoComparacao()">
            Comparar Deputados
        </button>

        <button id="btn-gerar-comparacao" style="display:none;">
            Gerar Comparação [0/8]
        </button>
    </div>

    <div id="lista-deputados" class="grid"></div>
</main>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">

    <div style="background:white; padding:20px; border-radius:10px; width:90%; max-width:900px;">
        <button onclick="fecharModal()">X</button>
        <h2>Comparação</h2>
        <div id="comparacao"></div>
    </div>
</div>

<script>
let selecionados = new Set();
let modoComparacao = false;
let todosDeputados = [];

// NORMALIZAÇÃO
function normalizarDeputado(d) {
    return {
        id: d.id,
        nome: d.nome || "Sem nome",
        partido: d.siglaPartido || d.partido || "-",
        uf: d.siglaUf || d.uf || "-",
        foto: d.urlFoto || d.foto || ""
    };
}

// CARREGAR
async function carregarDeputados() {
    try {
        const res = await fetch('/api/deputados');
        const json = await res.json();

        const lista = Array.isArray(json) ? json : json.dados || [];

        todosDeputados = lista.map(normalizarDeputado);

        popularFiltros();
        renderizarCards(todosDeputados);

    } catch (e) {
        console.error(e);
        document.getElementById("contagem").innerText = "Erro ao carregar";
    }
}

// FILTROS
function popularFiltros() {
    const estados = [...new Set(todosDeputados.map(d => d.uf))];
    const partidos = [...new Set(todosDeputados.map(d => d.partido))];

    const selEstado = document.getElementById("filtro-estado");
    const selPartido = document.getElementById("filtro-partido");

    selEstado.innerHTML = '<option value="">Todos</option>';
    selPartido.innerHTML = '<option value="">Todos</option>';

    estados.forEach(e => selEstado.innerHTML += `<option>${e}</option>`);
    partidos.forEach(p => selPartido.innerHTML += `<option>${p}</option>`);
}

// RENDER
function renderizarCards(lista) {
    document.getElementById("contagem").innerText = `${lista.length} deputados`;

    document.getElementById("lista-deputados").innerHTML = lista.map(d => {
        const foto = d.foto || "https://www.camara.leg.br/tema/assets/images/foto-deputado-ausente.png";

        return `
        <div class="card" style="text-align:center; border:${selecionados.has(d.id) ? '2px solid orange' : '1px solid #ddd'}">

            <img src="${foto}" style="width:100%; height:200px; object-fit:cover;">

            <h3>${d.nome}</h3>
            <p>${d.partido} - ${d.uf}</p>

            ${
                modoComparacao
                ? `<button class="btn-selecionar" data-id="${d.id}">
                        ${selecionados.has(d.id) ? "Selecionado" : "Selecionar"}
                   </button>`
                : `<a href="/perfil.html?id=${d.id}">Ver Perfil</a>`
            }
        </div>
        `;
    }).join("");
}

// FILTRO
function aplicarFiltros() {
    const nome = document.getElementById("busca-nome").value.toLowerCase();
    const uf = document.getElementById("filtro-estado").value;
    const partido = document.getElementById("filtro-partido").value;

    const filtrados = todosDeputados.filter(d =>
        d.nome.toLowerCase().includes(nome) &&
        (uf === "" || d.uf === uf) &&
        (partido === "" || d.partido === partido)
    );

    renderizarCards(filtrados);
}

document.getElementById("busca-nome").addEventListener("input", aplicarFiltros);
document.getElementById("filtro-estado").addEventListener("change", aplicarFiltros);
document.getElementById("filtro-partido").addEventListener("change", aplicarFiltros);

// MODO COMPARAÇÃO
function toggleModoComparacao() {
    modoComparacao = !modoComparacao;

    const btnModo = document.getElementById("btn-modo");
    const btnGerar = document.getElementById("btn-gerar-comparacao");

    btnModo.innerText = modoComparacao ? "Voltar" : "Comparar Deputados";
    btnGerar.style.display = modoComparacao ? "inline-block" : "none";

    if (!modoComparacao) selecionados.clear();

    atualizarBotao();
    renderizarCards(todosDeputados);
}

// SELEÇÃO
document.addEventListener("click", e => {
    if (!modoComparacao) return;

    const btn = e.target.closest(".btn-selecionar");
    if (!btn) return;

    const id = Number(btn.dataset.id);

    if (selecionados.has(id)) {
        selecionados.delete(id);
    } else {
        if (selecionados.size >= 8) {
            toast("Máximo 8 deputados");
            return;
        }
        selecionados.add(id);
    }

    atualizarBotao();
    renderizarCards(todosDeputados);
});

// BOTÃO
function atualizarBotao() {
    const btn = document.getElementById("btn-gerar-comparacao");
    btn.innerText = `Gerar Comparação [${selecionados.size}/8]`;
    btn.disabled = selecionados.size < 2;
}

// 🔥 AQUI ESTAVA O PROBLEMA (não tinha evento)
document.getElementById("btn-gerar-comparacao").addEventListener("click", gerarComparacao);

// COMPARAÇÃO
function gerarComparacao() {
    if (selecionados.size < 2) return;

    const lista = todosDeputados.filter(d => selecionados.has(d.id));

    document.getElementById("comparacao").innerHTML = `
        <table style="width:100%; text-align:center;">
            <tr>
                <th>Nome</th>
                ${lista.map(d => `<td>${d.nome}</td>`).join('')}
            </tr>
            <tr>
                <th>Partido</th>
                ${lista.map(d => `<td>${d.partido}</td>`).join('')}
            </tr>
            <tr>
                <th>UF</th>
                ${lista.map(d => `<td>${d.uf}</td>`).join('')}
            </tr>
        </table>
    `;

    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

// TOAST
function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(() => t.classList.remove("show"), 2000);
}

// INIT
carregarDeputados();
</script>

</body>
</html>
